<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SODA // TASK_OS v3.0</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
  :root { --cyan:#00fff9;--pink:#ff006e;--yellow:#ffd60a;--purple:#7b2fff;--dark:#0a0a0f;--darker:#050508;--card:#0d0d1a;--border:#1a1a2e; }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--darker);color:var(--cyan);font-family:'Share Tech Mono',monospace;min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,249,.015) 2px,rgba(0,255,249,.015) 4px);pointer-events:none;z-index:9999}
  body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background-image:linear-gradient(rgba(0,255,249,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,249,.03) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;z-index:0}
  .container{max-width:900px;margin:0 auto;padding:20px;position:relative;z-index:1}
  header{text-align:center;padding:30px 0 20px}
  .logo{font-family:'Orbitron',monospace;font-size:2.5rem;font-weight:900;letter-spacing:.3em;color:var(--cyan);text-shadow:0 0 10px var(--cyan),0 0 30px var(--cyan),0 0 60px var(--cyan);animation:flicker 4s infinite}
  .logo span{color:var(--pink);text-shadow:0 0 10px var(--pink),0 0 30px var(--pink)}
  .subtitle{font-size:.75rem;color:rgba(0,255,249,.5);letter-spacing:.4em;margin-top:5px}
  .clock{font-family:'Orbitron',monospace;font-size:1.1rem;color:var(--yellow);text-shadow:0 0 8px var(--yellow);margin-top:10px}
  .sync-status{font-size:.65rem;letter-spacing:.2em;margin-top:6px}
  .sync-ok{color:rgba(0,255,100,.7)}.sync-err{color:var(--pink)}
  @keyframes flicker{0%,95%,100%{opacity:1}96%{opacity:.8}97%{opacity:1}98%{opacity:.6}99%{opacity:1}}
  .stats-bar{display:flex;gap:15px;margin:20px 0;flex-wrap:wrap}
  .stat{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--cyan);padding:10px 15px;flex:1;min-width:120px;text-align:center}
  .stat-num{font-family:'Orbitron',monospace;font-size:1.5rem;font-weight:700;color:var(--cyan);text-shadow:0 0 8px var(--cyan)}
  .stat-label{font-size:.65rem;color:rgba(0,255,249,.5);letter-spacing:.2em;margin-top:3px}
  .stat.pink{border-left-color:var(--pink)}.stat.pink .stat-num{color:var(--pink);text-shadow:0 0 8px var(--pink)}
  .stat.yellow{border-left-color:var(--yellow)}.stat.yellow .stat-num{color:var(--yellow);text-shadow:0 0 8px var(--yellow)}
  .progress-container{margin:15px 0;background:var(--card);border:1px solid var(--border);padding:12px 15px}
  .progress-label{font-size:.7rem;letter-spacing:.2em;color:rgba(0,255,249,.6);margin-bottom:8px;display:flex;justify-content:space-between}
  .progress-bar{height:6px;background:rgba(0,255,249,.1);overflow:hidden}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--purple));box-shadow:0 0 10px var(--cyan);transition:width .5s}
  .input-panel{background:var(--card);border:1px solid var(--border);border-top:2px solid var(--cyan);padding:20px;margin:20px 0;position:relative}
  .input-panel::before{content:'// NEW_TASK';position:absolute;top:-10px;left:15px;background:var(--card);padding:0 8px;font-size:.7rem;color:var(--cyan);letter-spacing:.2em}
  .input-row{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  input[type=text],input[type=time],input[type=date],select{background:rgba(0,255,249,.05);border:1px solid rgba(0,255,249,.2);color:var(--cyan);font-family:'Share Tech Mono',monospace;font-size:.9rem;padding:10px 14px;outline:none;transition:border-color .3s}
  input[type=text]:focus,input[type=time]:focus,input[type=date]:focus,select:focus{border-color:var(--cyan);box-shadow:0 0 10px rgba(0,255,249,.2)}
  input[type=text]{flex:1;min-width:200px}select{cursor:pointer;min-width:130px}
  select option{background:var(--dark);color:var(--cyan)}
  .btn{background:transparent;border:1px solid var(--cyan);color:var(--cyan);font-family:'Orbitron',monospace;font-size:.75rem;font-weight:700;letter-spacing:.1em;padding:10px 20px;cursor:pointer;transition:all .2s;white-space:nowrap}
  .btn:hover{background:var(--cyan);color:var(--dark);box-shadow:0 0 20px var(--cyan)}
  .btn.pink{border-color:var(--pink);color:var(--pink)}.btn.pink:hover{background:var(--pink);color:var(--dark);box-shadow:0 0 20px var(--pink)}
  .reminder-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .reminder-label{font-size:.7rem;color:rgba(0,255,249,.5);letter-spacing:.15em}
  .filters{display:flex;gap:8px;margin:15px 0;flex-wrap:wrap}
  .filter-btn{background:transparent;border:1px solid rgba(0,255,249,.2);color:rgba(0,255,249,.5);font-family:'Share Tech Mono',monospace;font-size:.75rem;padding:6px 14px;cursor:pointer;letter-spacing:.1em;transition:all .2s}
  .filter-btn:hover,.filter-btn.active{border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 8px rgba(0,255,249,.3)}
  .section-title{font-family:'Orbitron',monospace;font-size:.7rem;letter-spacing:.3em;color:rgba(0,255,249,.4);margin:20px 0 10px;border-bottom:1px solid var(--border);padding-bottom:8px}
  .task-list{list-style:none}
  .task-item{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--cyan);margin-bottom:8px;padding:14px 16px;display:flex;align-items:center;gap:12px;transition:all .3s;animation:slideIn .3s ease}
  @keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
  .task-item:hover{border-color:var(--cyan);box-shadow:0 0 15px rgba(0,255,249,.1)}
  .task-item.priority-high{border-left-color:var(--pink)}.task-item.priority-medium{border-left-color:var(--yellow)}.task-item.priority-low{border-left-color:var(--purple)}
  .task-item.done{opacity:.4;border-left-color:rgba(0,255,249,.2)}
  .task-item.done .task-text{text-decoration:line-through;text-decoration-color:var(--cyan)}
  .task-checkbox{width:18px;height:18px;border:1px solid var(--cyan);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
  .task-checkbox:hover{background:rgba(0,255,249,.1);box-shadow:0 0 8px var(--cyan)}
  .task-checkbox.checked{background:var(--cyan);box-shadow:0 0 10px var(--cyan)}
  .task-checkbox.checked::after{content:'✓';color:var(--dark);font-size:12px;font-weight:bold}
  .task-content{flex:1}
  .task-text{font-size:.95rem;color:rgba(0,255,249,.9);word-break:break-word}
  .task-meta{display:flex;gap:10px;margin-top:5px;flex-wrap:wrap}
  .task-tag{font-size:.6rem;padding:2px 8px;border:1px solid;letter-spacing:.1em}
  .tag-priority-high{border-color:var(--pink);color:var(--pink)}.tag-priority-medium{border-color:var(--yellow);color:var(--yellow)}.tag-priority-low{border-color:var(--purple);color:var(--purple)}.tag-cat{border-color:rgba(0,255,249,.3);color:rgba(0,255,249,.6)}
  .task-reminder{font-size:.65rem;color:rgba(255,214,10,.7)}.task-reminder::before{content:'⏰ '}
  .task-actions{display:flex;gap:6px;flex-shrink:0}
  .task-btn{background:transparent;border:1px solid rgba(0,255,249,.2);color:rgba(0,255,249,.5);font-size:.75rem;padding:4px 8px;cursor:pointer;transition:all .2s;font-family:'Share Tech Mono',monospace}
  .task-btn:hover{border-color:var(--pink);color:var(--pink)}
  .notification{position:fixed;top:20px;right:20px;background:var(--card);border:1px solid var(--cyan);border-left:4px solid var(--pink);padding:15px 20px;max-width:320px;z-index:10000;animation:slideInRight .3s ease;box-shadow:0 0 30px rgba(255,0,110,.3)}
  @keyframes slideInRight{from{opacity:0;transform:translateX(100px)}to{opacity:1;transform:translateX(0)}}
  .notif-title{font-family:'Orbitron',monospace;font-size:.7rem;color:var(--pink);letter-spacing:.2em;margin-bottom:5px}
  .notif-text{font-size:.85rem;color:var(--cyan)}
  .empty-state{text-align:center;padding:40px;color:rgba(0,255,249,.2);font-size:.85rem;letter-spacing:.2em}
  .empty-state .icon{font-size:2rem;margin-bottom:10px}
  footer{text-align:center;padding:30px 0 20px;font-size:.65rem;color:rgba(0,255,249,.2);letter-spacing:.3em}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--darker)}::-webkit-scrollbar-thumb{background:rgba(0,255,249,.3)}
  @media(max-width:600px){.logo{font-size:1.6rem}.input-row{flex-direction:column}}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">SODA<span>//</span>OS</div>
    <div class="subtitle">TASK MANAGEMENT SYSTEM · BANORTE ENTERPRISE · v3.0</div>
    <div class="clock" id="clock">--:--:--</div>
    <div class="sync-status" id="sync-status">⟳ CONECTANDO...</div>
  </header>
  <div class="stats-bar">
    <div class="stat"><div class="stat-num" id="stat-total">0</div><div class="stat-label">TOTAL</div></div>
    <div class="stat yellow"><div class="stat-num" id="stat-pending">0</div><div class="stat-label">PENDIENTE</div></div>
    <div class="stat pink"><div class="stat-num" id="stat-done">0</div><div class="stat-label">COMPLETADO</div></div>
    <div class="stat" style="border-left-color:var(--purple)"><div class="stat-num" id="stat-reminders" style="color:var(--purple);text-shadow:0 0 8px var(--purple)">0</div><div class="stat-label">ALERTAS</div></div>
  </div>
  <div class="progress-container">
    <div class="progress-label"><span>// MISSION PROGRESS</span><span id="progress-pct">0%</span></div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div class="input-panel">
    <div class="input-row">
      <input type="text" id="task-input" placeholder="// NUEVA TAREA..." maxlength="200"/>
      <select id="priority-select"><option value="medium">⚡ MEDIA</option><option value="high">🔴 ALTA</option><option value="low">🟣 BAJA</option></select>
      <select id="cat-select"><option value="general">GENERAL</option><option value="trabajo">TRABAJO</option><option value="personal">PERSONAL</option><option value="banorte">BANORTE</option><option value="urgente">URGENTE</option></select>
    </div>
    <div class="reminder-row">
      <span class="reminder-label">⏰ RECORDATORIO:</span>
      <input type="date" id="reminder-date"/>
      <input type="time" id="reminder-time"/>
      <button class="btn" onclick="addTask()">[ + AGREGAR ]</button>
      <button class="btn pink" onclick="clearDone()">[ LIMPIAR ✓ ]</button>
    </div>
  </div>
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">ALL</button>
    <button class="filter-btn" onclick="setFilter('pending',this)">PENDING</button>
    <button class="filter-btn" onclick="setFilter('done',this)">DONE</button>
    <button class="filter-btn" onclick="setFilter('high',this)">🔴 HIGH</button>
    <button class="filter-btn" onclick="setFilter('reminders',this)">⏰ ALERTS</button>
  </div>
  <div class="section-title">// TASK_QUEUE</div>
  <ul class="task-list" id="task-list"></ul>
  <footer>SODA // TASK_OS v3.0 · BANORTE ENTERPRISE INTELLIGENCE · LIVE SYNC ENABLED</footer>
</div>
<div id="notif-container"></div>
<script>
  const API = '';  // same origin
  let tasks = [], currentFilter = 'all', scheduledReminders = {};

  function updateClock() {
    const n=new Date(), h=String(n.getHours()).padStart(2,'0'), m=String(n.getMinutes()).padStart(2,'0'), s=String(n.getSeconds()).padStart(2,'0');
    document.getElementById('clock').textContent = n.toLocaleDateString('es-MX',{weekday:'short',year:'numeric',month:'short',day:'numeric'})+' · '+h+':'+m+':'+s;
  }
  setInterval(updateClock,1000); updateClock();

  async function apiFetch(path,opts={}) {
    const r=await fetch(API+path,opts);
    if(!r.ok) throw new Error(r.status);
    return r.json();
  }

  async function loadTasks() {
    try {
      tasks=await apiFetch('/tasks');
      document.getElementById('sync-status').className='sync-status sync-ok';
      document.getElementById('sync-status').textContent='✓ SINCRONIZADO · LIVE';
      render(); scheduleAllReminders();
    } catch(e) {
      document.getElementById('sync-status').className='sync-status sync-err';
      document.getElementById('sync-status').textContent='✕ ERROR DE CONEXIÓN';
    }
  }

  setInterval(loadTasks,5000);

  async function addTask() {
    const text=document.getElementById('task-input').value.trim();
    if(!text){showNotif('ERROR','Ingrese una tarea.','pink');return}
    const date=document.getElementById('reminder-date').value, time=document.getElementById('reminder-time').value;
    const reminder=(date&&time)?`${date}T${time}`:null;
    try {
      await apiFetch('/tasks',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({text,priority:document.getElementById('priority-select').value,category:document.getElementById('cat-select').value,reminder})});
      document.getElementById('task-input').value='';
      document.getElementById('reminder-date').value='';
      document.getElementById('reminder-time').value='';
      showNotif('TAREA AGREGADA',text,'cyan');
      await loadTasks();
    } catch(e){showNotif('ERROR','Sin conexión.','pink')}
  }

  async function toggleDone(id) {
    const t=tasks.find(t=>t.id===id); if(!t)return;
    try{await apiFetch(`/tasks/${id}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({done:!t.done})});await loadTasks();}catch(e){}
  }

  async function deleteTask(id) {
    try{await apiFetch(`/tasks/${id}`,{method:'DELETE'});await loadTasks();}catch(e){}
  }

  async function clearDone() {
    const done=tasks.filter(t=>t.done);
    for(const t of done){try{await apiFetch(`/tasks/${t.id}`,{method:'DELETE'});}catch(e){}}
    showNotif('SISTEMA',`${done.length} eliminadas.`,'pink');await loadTasks();
  }

  function setFilter(f,btn){currentFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}

  function getFiltered(){
    switch(currentFilter){case'pending':return tasks.filter(t=>!t.done);case'done':return tasks.filter(t=>t.done);case'high':return tasks.filter(t=>t.priority==='high');case'reminders':return tasks.filter(t=>t.reminder&&!t.done);default:return tasks;}
  }

  function formatReminder(iso){if(!iso)return'';return new Date(iso).toLocaleString('es-MX',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});}

  function scheduleAllReminders(){
    tasks.forEach(t=>{
      if(!t.done&&t.reminder&&!scheduledReminders[t.id]){
        const diff=new Date(t.reminder).getTime()-Date.now();
        if(diff>0)scheduledReminders[t.id]=setTimeout(()=>{showNotif('⏰ RECORDATORIO',t.text,'yellow',8000);if(Notification.permission==='granted')new Notification('SODA // RECORDATORIO',{body:t.text});},diff);
      }
    });
  }

  if('Notification'in window&&Notification.permission==='default')Notification.requestPermission();

  function render(){
    const filtered=getFiltered(), total=tasks.length, done=tasks.filter(t=>t.done).length;
    document.getElementById('stat-total').textContent=total;
    document.getElementById('stat-done').textContent=done;
    document.getElementById('stat-pending').textContent=total-done;
    document.getElementById('stat-reminders').textContent=tasks.filter(t=>t.reminder&&!t.done).length;
    const pct=total>0?Math.round((done/total)*100):0;
    document.getElementById('progress-fill').style.width=pct+'%';
    document.getElementById('progress-pct').textContent=pct+'%';
    const list=document.getElementById('task-list');
    if(!filtered.length){list.innerHTML='<div class="empty-state"><div class="icon">◈</div>NO HAY TAREAS</div>';return;}
    list.innerHTML=filtered.map(t=>`
      <li class="task-item priority-${t.priority} ${t.done?'done':''}">
        <div class="task-checkbox ${t.done?'checked':''}" onclick="toggleDone(${t.id})"></div>
        <div class="task-content">
          <div class="task-text">${esc(t.text)}</div>
          <div class="task-meta">
            <span class="task-tag tag-priority-${t.priority}">${t.priority.toUpperCase()}</span>
            <span class="task-tag tag-cat">${t.category.toUpperCase()}</span>
            ${t.reminder?`<span class="task-reminder">${formatReminder(t.reminder)}</span>`:''}
          </div>
        </div>
        <div class="task-actions"><button class="task-btn" onclick="deleteTask(${t.id})">✕</button></div>
      </li>`).join('');
  }

  function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  function showNotif(title,text,color='cyan',duration=3500){
    const c=document.getElementById('notif-container'),n=document.createElement('div');
    n.className='notification';
    n.style.borderLeftColor=color==='pink'?'var(--pink)':color==='yellow'?'var(--yellow)':'var(--cyan)';
    n.innerHTML=`<div class="notif-title">// ${title}</div><div class="notif-text">${text}</div>`;
    c.appendChild(n);
    setTimeout(()=>{n.style.opacity='0';n.style.transition='opacity .5s';setTimeout(()=>n.remove(),500);},duration);
  }

  document.getElementById('task-input').addEventListener('keydown',e=>{if(e.key==='Enter')addTask();});
  loadTasks();
  showNotif('SISTEMA ONLINE','Soda // Task OS v3.0 · Live Sync activo.','cyan',4000);
</script>
</body>
</html>
